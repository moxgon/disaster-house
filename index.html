<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disaster House</title>
  <meta name="description" content="Disaster House — Camden, Maine. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="sheet">
   <div class="frame">
    <h1 class="title">Disaster House</h1>
    <nav class="tabs">
      <a href="index.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
    </nav>
    <hr class="rule">
    
    <p class="coming">Coming Soon...</p>

    <div class="signup">
      <form id="signup-form" novalidate>
        <input type="email" name="email" placeholder="you@elsewhere.com" aria-label="Email address" autocomplete="email" required>
        <!-- >:) -->
        <input type="text" name="company" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
        <button type="submit">send word</button>
      </form>
      <p class="form-msg" role="status" aria-live="polite"></p>
    </div>

    <figure class="plate">
      <img src="window.png" alt="A mezzotint of figures gathered at a candlelit window">
    </figure>


    <hr class="rule" style="margin-top:1.5rem">
    <div class="colophon">Disaster House &bull; Camden, ME &bull;
      <a href="https://instagram.com/disaster.house" target="_blank" rel="noopener">Instagram</a> &bull;
      <a href="mailto:max@disaster.house">Email</a></div>
   </div>
  </main>

  <script>
    (function () {
      var ENDPOINT = "https://script.google.com/macros/s/AKfycbx9NBeZhILNS5nduYes4ntksws9c2NK1EmMzAEoAn4AG1MoFQXrT3rRsk1_73DPmpLtlQ/exec";

      var form = document.getElementById('signup-form');
      var msg  = document.querySelector('.form-msg');
      var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (form.company.value) return;            
        var email = form.email.value.trim();
        if (!emailRe.test(email)) {
          msg.textContent = 'That doesn’t look like an email.';
          return;
        }
        if (ENDPOINT.indexOf('PASTE_') === 0) {
          msg.textContent = '(form not yet connected)';
          return;
        }
        var btn = form.querySelector('button');
        btn.disabled = true;
        msg.textContent = 'Sending…';
        fetch(ENDPOINT, {
          method: 'POST',
          mode: 'no-cors',
          body: new URLSearchParams({ email: email, source: 'coming-soon' })
        }).then(function () {
          form.reset();
          msg.textContent = 'You’re on the list.';
        }).catch(function () {
          msg.textContent = 'Something went wrong — please try again later.';
        }).finally(function () {
          btn.disabled = false;
        });
      });
    })();
  </script>
</body>
</html>
